# everos OME (Offline Memory Engine) — strategy configuration.
#
# THIS IS THE SINGLE ENTRY POINT for all strategy settings (enabled,
# cron, max_retries, gate). Edit this file to toggle strategies on/off
# or tune their scheduling — changes are hot-reloaded within ~2 seconds,
# no server restart needed.
#
# Created at ``~/.everos/ome.toml`` on first server start. Editing the
# file after creation is safe — it will not be overwritten.
#
# Overrides are partial: only the keys you set replace the in-code
# defaults; omitted keys keep each strategy's coded value. Unknown
# keys (typos) raise StartupValidationError, so you cannot silently
# misconfigure a strategy.
#
# Per-strategy schema (StrategyOverride):
#   enabled                = bool           # disable a strategy entirely
#   max_retries            = int >= 0       # re-fire on failure
#   cron                   = str            # replace the @cron(...) trigger
#   idle_seconds           = int > 0        # replace @idle(...) idle window
#   scan_interval_seconds  = int > 0        # paired with idle_seconds; must be <= idle/2
#   [strategies.<name>.gate]                # only valid on @counter-gated strategies
#   threshold              = int > 0        # counter trigger threshold
#   cooldown_seconds       = int >= 0       # min seconds between fires
#   event_field            = str            # dispatch field for counter increment

# ── User-memory pipeline ────────────────────────────────────────────────

# Atomic fact extraction runs per memcell. Always enabled — search
# depends on atomic facts for MaxSim retrieval.

# Foresight extraction (runs per memcell). Heavy LLM call — set
# enabled = false to skip in evaluation / benchmark runs.
# [strategies.extract_foresight]
# enabled = true

# Profile clustering trigger (fires on each EpisodeExtracted event).
# [strategies.trigger_profile_clustering]
# enabled = true

# User-profile extraction (runs after clustering trigger fires). Set
# enabled = false to skip in evaluation runs.
# [strategies.extract_user_profile]
# enabled = true

# ── Reflection ──────────────────────────────────────────────────────────

# Offline memory consolidation. Disabled by default. To enable,
# uncomment and set enabled = true. Runs weekly Monday 02:00.
# Run sparingly — at most once a week. Each run is a lossy LLM re-merge.
# [strategies.reflect_episodes]
# enabled = false
# cron = "0 2 * * 1"

# ── Agent-memory pipeline ───────────────────────────────────────────────

# Agent case extraction (runs per agent memcell). One per tool call cycle.
# [strategies.extract_agent_case]
# enabled = true

# Skill clustering trigger (fires on each AgentCaseExtracted event).
# [strategies.trigger_skill_clustering]
# enabled = true

# Agent skill extraction (runs after skill clustering trigger fires).
# [strategies.extract_agent_skill]
# enabled = true
